<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Termul Web</title>
    <meta name="color-scheme" content="dark" />
    <style>
        * { box-sizing: border-box; }
        html, body, #root { height: 100%; }
        body {
            margin: 0;
            background: #0a0a0f;
            color: #e4e4e7;
            font-family: Inter, system-ui, sans-serif;
        }
        #boot-status {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #18181b, #09090b 60%);
            color: #a1a1aa;
            font-size: 14px;
            letter-spacing: 0.02em;
        }
        #boot-status.hidden { display: none; }
        .boot-card {
            width: min(520px, calc(100vw - 32px));
            border: 1px solid rgba(63, 63, 70, 0.9);
            border-radius: 24px;
            background: rgba(9, 9, 11, 0.95);
            padding: 28px;
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
        }
        .boot-title { color: #fafafa; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .boot-text { line-height: 1.6; }
        .boot-code {
            margin-top: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(63, 63, 70, 0.9);
            background: #09090b;
            color: #d4d4d8;
            font-family: "JetBrains Mono", Consolas, monospace;
            font-size: 12px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <div id="boot-status">
        <div class="boot-card">
            <div class="boot-title">Loading Termul Web</div>
            <div class="boot-text">React web client loaded through Vite dev server.</div>
            <div class="boot-code">Expected dev server: http://127.0.0.1:5173</div>
        </div>
    </div>
    <script>
        window.AUTH_TOKEN = "__TERMUL_TOKEN__";
        window.TERMUL_SESSION_ID = "__TERMUL_SESSION_ID__";
        window.TERMUL_ACTIVE_PROJECT_ID = "__TERMUL_ACTIVE_PROJECT_ID__";
        window.TERMUL_TOKEN_EXPIRES = "__TERMUL_TOKEN_EXPIRES__";
    </script>
    <script type="module">
        import("http://127.0.0.1:5173/src/renderer/web-main.tsx")
            .then(() => {
                const boot = document.getElementById("boot-status");
                if (boot) boot.classList.add("hidden");
            })
            .catch((error) => {
                const boot = document.getElementById("boot-status");
                if (!boot) return;
                boot.innerHTML = `
                    <div class="boot-card">
                        <div class="boot-title">React dev server not reachable</div>
                        <div class="boot-text">Start web client first, then reload this page.</div>
                        <div class="boot-code">npm run dev:web\n${String(error)}</div>
                    </div>
                `;
            });
    </script>
</body>
</html>

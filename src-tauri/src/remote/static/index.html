<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#181825" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Termul Remote</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23181825'/%3E%3Cpath d='M9 11l5 5-5 5M17 21h6' stroke='%2389b4fa' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/vendor/xterm.min.css" />
  <link rel="stylesheet" href="/static/fonts/urbanist.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e2e; --bg-alt: #181825; --panel: #11111b; --crust: #0e0e16;
      --border: #313244; --border-soft: #26263a;
      --fg: #cdd6f4; --muted: #a6adc8; --faint: #6c7086;
      --accent: #89b4fa; --accent-dim: #89b4fa26;
      --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af;

      /* Strong custom easings — built-ins lack punch (Emil Kowalski) */
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
      --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);

      --mono: "Cascadia Code", "JetBrains Mono", "SF Mono", ui-monospace, monospace;
      --sans: "Urbanist", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--fg); font-family: var(--sans); }
    body { display: flex; flex-direction: column; overflow: hidden; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    /* Honour notch / rounded-corner safe areas on phones. */
    #topbar { padding-left: max(14px, env(safe-area-inset-left)); padding-right: max(14px, env(safe-area-inset-right)); }

    /* ── Top bar ─────────────────────────────────────────────────────── */
    #topbar {
      display: flex; align-items: center; gap: 14px;
      height: 44px; padding: 0 14px; flex-shrink: 0;
      background: linear-gradient(180deg, var(--bg-alt), #15151f);
      border-bottom: 1px solid var(--border-soft);
      font-size: 13px; -webkit-user-select: none; user-select: none;
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; color: var(--fg); letter-spacing: .01em; flex-shrink: 0; }
    .brand .logo {
      width: 20px; height: 20px; border-radius: 5px; display: grid; place-items: center;
      background: var(--accent-dim); color: var(--accent); flex-shrink: 0;
    }
    .brand .logo svg { width: 13px; height: 13px; }

    /* Sidebar minimize toggle */
    .icon-btn {
      width: 28px; height: 28px; flex-shrink: 0; display: grid; place-items: center;
      border: 1px solid var(--border-soft); border-radius: 7px; background: #ffffff05;
      color: var(--muted); cursor: pointer;
      transition: color 150ms var(--ease-out), border-color 150ms var(--ease-out),
                  background 150ms var(--ease-out), transform 120ms var(--ease-out);
    }
    .icon-btn svg { width: 15px; height: 15px; transition: transform 240ms var(--ease-out); }
    .icon-btn:active { transform: scale(0.92); }
    /* Flip the panel glyph when collapsed as a subtle state cue. */
    .sidebar-collapsed #sidebar-toggle svg { transform: scaleX(-1); }

    #active-name {
      display: flex; align-items: baseline; gap: 6px;
      padding-left: 14px; border-left: 1px solid var(--border-soft);
      max-width: 34vw; overflow: hidden;
      opacity: 0; transform: translateY(1px);
      transition: opacity 180ms var(--ease-out), transform 180ms var(--ease-out);
    }
    #active-name.show { opacity: 1; transform: translateY(0); }
    #active-name .an-name { color: var(--accent); font-size: 12.5px; font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; }
    #active-name .an-sep { color: var(--faint); opacity: .6; flex-shrink: 0; }
    #active-name .an-proj { color: var(--muted); font-size: 11.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 2; min-width: 0; }

    /* View-mode segmented control */
    .view-switch {
      margin-left: auto; position: relative; display: flex; align-items: center;
      gap: 0; padding: 3px; border-radius: 9px; background: #ffffff08;
      border: 1px solid var(--border-soft); flex-shrink: 0;
    }
    .view-switch .seg-indicator {
      position: absolute; top: 3px; left: 3px; height: calc(100% - 6px); width: 34px;
      border-radius: 6px; background: var(--accent-dim);
      box-shadow: inset 0 0 0 1px #89b4fa44;
      transform: translateX(0); transition: transform 240ms var(--ease-out);
    }
    .view-switch button {
      position: relative; z-index: 1; width: 34px; height: 24px;
      display: inline-flex; align-items: center; justify-content: center; gap: 3px;
      background: none; border: none; cursor: pointer; color: var(--faint);
      font-family: var(--sans); font-size: 11.5px; font-weight: 600; font-variant-numeric: tabular-nums;
      transition: color 160ms var(--ease-out), transform 120ms var(--ease-out);
    }
    .view-switch button svg { width: 12px; height: 12px; }
    .view-switch button.active { color: var(--accent); }
    .view-switch button:not(.active):hover { color: var(--muted); }
    .view-switch button:active { transform: scale(0.9); }

    #status { display: flex; align-items: center; gap: 7px; color: var(--muted); font-size: 12px; flex-shrink: 0; }
    #status .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--faint);
      transition: background 200ms var(--ease-out), box-shadow 200ms var(--ease-out);
    }
    #status.connected  .dot { background: var(--green); box-shadow: 0 0 0 3px #a6e3a122; }
    #status.connecting .dot { background: var(--yellow); animation: breathe 1.1s var(--ease-in-out) infinite; }
    #status.disconnected .dot { background: var(--red); box-shadow: 0 0 0 3px #f38ba822; }
    #status .stxt { white-space: nowrap; }
    @keyframes breathe { 0%,100% { opacity: 1; box-shadow: 0 0 0 3px #f9e2af22; } 50% { opacity: .45; box-shadow: 0 0 0 1px #f9e2af11; } }

    /* GitHub repo link + star count */
    .gh {
      display: inline-flex; align-items: center; gap: 7px; flex-shrink: 0;
      height: 27px; padding: 0 10px; text-decoration: none;
      color: var(--muted); font-size: 12px;
      border: 1px solid var(--border-soft); border-radius: 7px; background: #ffffff05;
      transition: color 150ms var(--ease-out), border-color 150ms var(--ease-out),
                  background 150ms var(--ease-out), transform 120ms var(--ease-out);
    }
    .gh:active { transform: scale(0.96); }
    .gh .gh-mark { width: 15px; height: 15px; flex-shrink: 0; }
    .gh .gh-star { display: inline-flex; align-items: center; gap: 4px; padding-left: 8px; border-left: 1px solid var(--border-soft); }
    .gh .gh-star svg { width: 12px; height: 12px; color: var(--yellow); flex-shrink: 0; }
    .gh-count { font-family: var(--mono); font-variant-numeric: tabular-nums; min-width: 12px; text-align: right; transition: opacity 220ms var(--ease-out); }
    .gh-count.loading { opacity: .35; }

    /* ── Layout ──────────────────────────────────────────────────────── */
    #main { flex: 1; display: flex; min-height: 0; }

    #sidebar {
      width: 264px; flex-shrink: 0; background: var(--panel);
      border-right: 1px solid var(--border-soft); overflow-y: auto; overflow-x: hidden;
      padding: 10px 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
      transition: width 260ms var(--ease-out), padding 260ms var(--ease-out),
                  opacity 180ms var(--ease-out);
    }
    /* Collapsed sidebar: slides to zero width and fades its contents. */
    #main.sidebar-collapsed #sidebar {
      width: 0; padding-left: 0; padding-right: 0; opacity: 0; pointer-events: none;
      border-right-color: transparent;
    }
    #sidebar::-webkit-scrollbar { width: 9px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; border: 2px solid var(--panel); }
    #sidebar::-webkit-scrollbar-thumb:hover { background: #45475a; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }

    .sidebar-label {
      font-size: 10.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      color: var(--faint); padding: 4px 10px 10px;
    }
    .empty { color: var(--muted); font-size: 12.5px; padding: 16px 10px; line-height: 1.6; }
    .empty .hint { color: var(--faint); font-size: 11.5px; margin-top: 6px; }

    .project { margin-bottom: 4px; }
    .project-head {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px 7px 6px; color: var(--fg); font-size: 13px; font-weight: 600;
      border-radius: 7px; cursor: pointer; user-select: none;
      transition: background 130ms var(--ease-out);
    }
    .project-head .chevron {
      width: 16px; height: 16px; flex-shrink: 0; color: var(--faint);
      display: grid; place-items: center;
      transition: transform 200ms var(--ease-out), color 130ms var(--ease-out);
    }
    .project-head .chevron svg { width: 12px; height: 12px; }
    .project.collapsed .project-head .chevron { transform: rotate(-90deg); }
    .project-head .pname { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .project-head .count {
      font-size: 10.5px; font-weight: 600; color: var(--faint);
      background: var(--border-soft); border-radius: 999px; padding: 1px 7px; min-width: 20px; text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .project-head .add {
      cursor: pointer; color: var(--muted); border: 1px solid var(--border);
      border-radius: 6px; width: 22px; height: 22px; flex-shrink: 0;
      display: grid; place-items: center; background: transparent;
      transition: color 140ms var(--ease-out), border-color 140ms var(--ease-out),
                  background 140ms var(--ease-out), transform 120ms var(--ease-out);
    }
    .project-head .add svg { width: 13px; height: 13px; }
    .project-head .add:active { transform: scale(0.92); }
    .project-head .add:disabled { cursor: default; }
    .project-head .add .spin { width: 12px; height: 12px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .term-list { display: grid; grid-template-rows: 1fr; transition: grid-template-rows 220ms var(--ease-out); }
    .project.collapsed .term-list { grid-template-rows: 0fr; }
    .term-list-inner { overflow: hidden; min-height: 0; }

    .term {
      position: relative; display: flex; align-items: center; gap: 9px;
      padding: 6px 8px 6px 22px; margin: 1px 0;
      font-size: 12.5px; color: var(--muted); cursor: pointer; border-radius: 7px;
      font-family: var(--mono);
      transition: background 130ms var(--ease-out), color 130ms var(--ease-out), transform 110ms var(--ease-out);
    }
    .term .tlabel { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .term .tdot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 130ms var(--ease-out), box-shadow 130ms var(--ease-out); }
    .term::before {
      content: ""; position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
      width: 2px; height: 0; border-radius: 2px; background: var(--accent);
      transition: height 160ms var(--ease-out);
    }
    .term:active { transform: scale(0.985); }
    /* "shown" = displayed in some pane; "active" = the focused pane */
    .term.shown { color: var(--fg); }
    .term.shown .tdot { background: var(--accent); }
    .term.active { background: var(--accent-dim); color: var(--accent); }
    .term.active .tdot { background: var(--accent); box-shadow: 0 0 0 3px #89b4fa22; }
    .term.active::before { height: 16px; }

    .term.enter, .project-head.enter {
      opacity: 0; transform: translateY(6px);
      animation: rowIn 320ms var(--ease-out) forwards;
    }
    @keyframes rowIn { to { opacity: 1; transform: translateY(0); } }

    /* ── Gallery (multi-view) ────────────────────────────────────────── */
    #gallery {
      flex: 1; min-width: 0; display: grid; gap: 10px; padding: 10px; background: var(--bg);
    }
    #gallery[data-view="1"]  { grid-template-columns: 1fr; grid-template-rows: 1fr; gap: 0; padding: 8px; }
    #gallery[data-view="2"]  { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
    #gallery[data-view="4"]  { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
    #gallery[data-view="8"]  { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); }
    #gallery[data-view="16"] { grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); }
    /* Dense grids: tighter gap so cells breathe without wasting space. */
    #gallery[data-view="8"], #gallery[data-view="16"] { gap: 7px; }

    .pane {
      position: relative; min-width: 0; min-height: 0; display: flex; flex-direction: column;
      background: var(--bg-alt); border-radius: 11px; overflow: hidden;
      /* Idle: soft hairline ring. Layered shadow gives quiet depth. */
      box-shadow: inset 0 0 0 1px var(--border-soft);
      transition: box-shadow 220ms var(--ease-out), transform 220ms var(--ease-out);
    }
    #gallery[data-view="1"] .pane { border-radius: 10px; }
    .pane.entering { opacity: 0; transform: scale(0.97); animation: paneIn 300ms var(--ease-out) forwards; }
    @keyframes paneIn { to { opacity: 1; transform: scale(1); } }
    /* Focus ring only in multi-view (single view has nothing to disambiguate).
       Crisp 1.5px accent inset + soft outer glow reads as "this one is live". */
    #gallery:not([data-view="1"]) .pane.focused {
      box-shadow: inset 0 0 0 1.5px var(--accent),
                  0 0 0 1px #89b4fa33,
                  0 6px 22px -6px #89b4fa3d;
    }
    /* Unfocused panes in multi-view recede slightly so the focused one pops. */
    @media (hover: hover) and (pointer: fine) {
      #gallery:not([data-view="1"]) .pane:not(.focused):hover {
        box-shadow: inset 0 0 0 1px var(--border);
      }
    }

    .pane-head {
      display: flex; align-items: center; gap: 8px; height: 30px; padding: 0 6px 0 10px;
      flex-shrink: 0; background: #15151f; border-bottom: 1px solid var(--border-soft);
      font-size: 11.5px; color: var(--muted); -webkit-user-select: none; user-select: none;
    }
    #gallery[data-view="1"] .pane-head { display: none; } /* single view: chrome-free, name is in topbar */
    .pane-head .pdot { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); flex-shrink: 0; transition: background 200ms var(--ease-out), box-shadow 200ms var(--ease-out); }
    .pane.s-connected .pdot { background: var(--green); box-shadow: 0 0 0 2.5px #a6e3a11f; }
    .pane.s-connecting .pdot { background: var(--yellow); animation: breathe 1.1s var(--ease-in-out) infinite; }
    .pane.s-failed .pdot { background: var(--red); box-shadow: 0 0 0 2.5px #f38ba81f; }
    /* Two-part title: terminal name (bright) + project (dim), separated by a thin dot. */
    .pane-head .ptitle { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 6px; overflow: hidden; }
    .pane-head .pt-name { font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 1; }
    .pane-head .pt-sep { color: var(--faint); flex-shrink: 0; opacity: .6; }
    .pane-head .pt-proj { font-size: 10.5px; color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 2; min-width: 0; }
    .pane.focused .pane-head { color: var(--fg); }
    .pane.focused .pane-head .pt-name { color: var(--accent); }
    .pane-close {
      width: 20px; height: 20px; flex-shrink: 0; display: grid; place-items: center;
      border: none; background: transparent; color: var(--faint); cursor: pointer; border-radius: 5px;
      opacity: 0; transition: opacity 140ms var(--ease-out), color 140ms var(--ease-out), background 140ms var(--ease-out), transform 120ms var(--ease-out);
    }
    .pane-close svg { width: 12px; height: 12px; }
    .pane-close:active { transform: scale(0.88); }
    .pane:hover .pane-close, .pane.focused .pane-close { opacity: 1; }

    .pane-body { position: relative; flex: 1; min-height: 0; padding: 4px 2px 2px 6px; }
    /* Blur crossfade masks the term.reset() flash when swapping terminals */
    .pane-body.swapping { filter: blur(7px); opacity: 0; }
    .pane-body {
      filter: blur(0); opacity: 1;
      transition: filter 200ms var(--ease-out), opacity 200ms var(--ease-out);
    }

    .pane-empty {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px; padding: 12px;
      color: var(--faint); text-align: center; line-height: 1.55;
      transition: opacity 200ms var(--ease-out);
    }
    .pane-empty.hide { opacity: 0; pointer-events: none; }
    /* Slot number badge — only meaningful in gallery (identifies the cell). */
    .pane-empty .pe-num {
      width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center;
      background: #ffffff08; border: 1px solid var(--border-soft);
      font-family: var(--mono); font-size: 12.5px; color: var(--muted);
    }
    /* Terminal glyph — visual anchor, mainly for single/large cells. */
    .pane-empty .pe-icon {
      width: 48px; height: 48px; border-radius: 13px; display: grid; place-items: center;
      background: var(--accent-dim); color: var(--accent);
    }
    .pane-empty .pe-icon svg { width: 24px; height: 24px; }
    .pane-empty .pe-title { font-size: 14px; font-weight: 600; color: var(--muted); }
    .pane-empty .pe-text { font-size: 12px; }
    .pane-empty kbd {
      font-family: var(--mono); font-size: 10.5px; background: var(--bg-alt);
      border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 5px; padding: 1px 6px; color: var(--fg);
    }
    /* Single/2-up: rich empty state (icon + title + hint). Hide the slot number. */
    #gallery[data-view="1"] .pe-num,
    #gallery[data-view="2"] .pe-num { display: none; }
    /* Dense gallery (4/8/16): compact — just the slot number + short label. */
    #gallery[data-view="4"] .pe-icon,
    #gallery[data-view="8"] .pe-icon,
    #gallery[data-view="16"] .pe-icon,
    #gallery[data-view="4"] .pe-title,
    #gallery[data-view="8"] .pe-title,
    #gallery[data-view="16"] .pe-title,
    #gallery[data-view="4"] .pe-hint,
    #gallery[data-view="8"] .pe-hint,
    #gallery[data-view="16"] .pe-hint { display: none; }
    #gallery[data-view="8"] .pane-empty .pe-text,
    #gallery[data-view="16"] .pane-empty .pe-text { font-size: 11px; }

    .pane-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: #11111bcc; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
      opacity: 0; pointer-events: none; transition: opacity 180ms var(--ease-out);
    }
    .pane-overlay.show { opacity: 1; pointer-events: auto; }
    .pane-overlay .ov-spin { width: 22px; height: 22px; border: 2.5px solid var(--accent); border-right-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
    .pane-overlay .ov-icon { width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center; background: #f38ba81a; color: var(--red); }
    .pane-overlay .ov-icon svg { width: 19px; height: 19px; }
    .pane-overlay .ov-text { color: var(--fg); font-size: 12.5px; font-weight: 500; text-align: center; padding: 0 12px; }
    .pane-overlay .ov-sub { color: var(--muted); font-size: 11px; margin-top: -6px; text-align: center; padding: 0 12px; }
    .pane-overlay button {
      font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--bg);
      background: var(--accent); border: none; border-radius: 7px; padding: 6px 14px; cursor: pointer;
      transition: transform 130ms var(--ease-out), filter 130ms var(--ease-out);
    }
    .pane-overlay button:hover { filter: brightness(1.08); }
    .pane-overlay button:active { transform: scale(0.97); }

    @media (hover: hover) and (pointer: fine) {
      .term:hover { background: #ffffff08; color: var(--fg); }
      .term.active:hover { background: var(--accent-dim); color: var(--accent); }
      .project-head:hover { background: #ffffff06; }
      .project-head:hover .chevron { color: var(--muted); }
      .project-head .add:hover:not(:disabled) { color: var(--green); border-color: var(--green); background: #a6e3a112; }
      .gh:hover { color: var(--fg); border-color: var(--border); background: #ffffff0d; }
      .pane-close:hover { color: var(--red); background: #f38ba81a; }
      .icon-btn:hover { color: var(--fg); border-color: var(--border); background: #ffffff0d; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
      .term.enter, .project-head.enter, .pane.entering { opacity: 1; transform: none; }
      .pane-body.swapping { filter: none; opacity: 1; }
      #status.connecting .dot, .pane.s-connecting .pdot { animation: none; }
    }

    /* ── Scrim behind the mobile drawer ──────────────────────────────── */
    #scrim {
      position: fixed; inset: 0; z-index: 40; background: #0008;
      opacity: 0; pointer-events: none; transition: opacity 240ms var(--ease-out);
      -webkit-backdrop-filter: blur(1px); backdrop-filter: blur(1px);
    }

    /* ── Mobile / narrow screens ────────────────────────────────────────
       The sidebar becomes an off-canvas drawer; dense grids cap at 2 columns so
       terminal cells stay legible on a phone. */
    @media (max-width: 720px) {
      #topbar { height: 50px; gap: 10px; }
      .brand { font-size: 0; gap: 0; }              /* keep just the logo mark */
      .brand .logo { width: 26px; height: 26px; }
      .brand .logo svg { width: 15px; height: 15px; }
      #active-name { display: none; }               /* freed space; name is on the pane head */
      .gh .gh-star { display: none; }               /* star count is desktop-only nicety */
      .gh { padding: 0 9px; height: 30px; }
      #status .stxt { display: none; }              /* keep just the colored dot */
      .icon-btn { width: 34px; height: 34px; }      /* ≥ touch target */
      .view-switch { padding: 3px; }
      .view-switch button { width: 30px; height: 28px; }
      .view-switch .seg-indicator { width: 30px; }

      /* Sidebar slides in from the left, above the gallery, over a scrim. */
      #sidebar {
        position: fixed; z-index: 50; top: 50px; left: 0; bottom: 0; width: 80vw; max-width: 320px;
        padding: 12px 10px calc(12px + env(safe-area-inset-bottom));
        padding-left: max(10px, env(safe-area-inset-left));
        border-right: 1px solid var(--border-soft);
        box-shadow: 8px 0 32px -8px #000a;
        transform: translateX(-100%);
        transition: transform 300ms var(--ease-drawer);
        opacity: 1;
      }
      /* On mobile the "open" state is drawer-open; default (collapsed) is hidden. */
      #main.drawer-open #sidebar { transform: translateX(0); }
      #main.drawer-open #scrim { opacity: 1; pointer-events: auto; }
      /* Neutralise the desktop collapse rule on mobile (drawer model instead). */
      #main.sidebar-collapsed #sidebar { width: 80vw; max-width: 320px; opacity: 1; padding: 12px 10px calc(12px + env(safe-area-inset-bottom)); border-right: 1px solid var(--border-soft); }

      #gallery { padding: 8px; gap: 8px; }
      /* A phone can't render 4/8/16 columns legibly — reflow to 1–2 columns. */
      #gallery[data-view="4"] { grid-template-columns: 1fr; grid-template-rows: repeat(4, minmax(0, 1fr)); }
      #gallery[data-view="8"] { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(4, minmax(0, 1fr)); }
      #gallery[data-view="16"] { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(8, minmax(0, 1fr)); }
      /* Multi-view gallery scrolls vertically when cells exceed the viewport. */
      #gallery:not([data-view="1"]) { overflow-y: auto; grid-auto-rows: minmax(160px, 1fr); -webkit-overflow-scrolling: touch; }
      .pane-head { height: 34px; }                  /* roomier touch target */
      .pane-close { width: 26px; height: 26px; opacity: 1; } /* always visible (no hover on touch) */
      .pane-empty .pe-title { font-size: 13px; }
    }

    /* Very small phones: shrink the topbar chrome a touch more. */
    @media (max-width: 380px) {
      #topbar { gap: 7px; padding-left: max(10px, env(safe-area-inset-left)); padding-right: max(10px, env(safe-area-inset-right)); }
      .gh { display: none; }                        /* reclaim width on tiny screens */
      .view-switch button { width: 27px; }
      .view-switch .seg-indicator { width: 27px; }
    }
  </style>
</head>
<body>
  <div id="topbar">
    <button id="sidebar-toggle" class="icon-btn" type="button" title="Toggle sidebar" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg>
    </button>
    <span class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7l5 5-5 5M13 17h6"/></svg>
      </span>
      Termul Remote
    </span>
    <span id="active-name"></span>

    <div class="view-switch" id="view-switch" role="group" aria-label="Terminal view layout">
      <span class="seg-indicator" aria-hidden="true"></span>
      <button type="button" data-view="1" title="Single view" aria-label="Single terminal">1</button>
      <button type="button" data-view="2" title="2 terminals">2</button>
      <button type="button" data-view="4" title="4 terminals">4</button>
      <button type="button" data-view="8" title="8 terminals">8</button>
      <button type="button" data-view="16" title="16 terminals">16</button>
    </div>

    <div id="status" class="disconnected"><span class="dot"></span><span class="stxt" id="status-text">Idle</span></div>

    <a class="gh" href="https://github.com/gnoviawan/termul" target="_blank" rel="noopener noreferrer"
       title="Star gnoviawan/termul on GitHub" aria-label="Star gnoviawan/termul on GitHub">
      <svg class="gh-mark" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      <span class="gh-star">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span class="gh-count loading" id="gh-count">—</span>
      </span>
    </a>
  </div>

  <div id="main">
    <aside id="sidebar"><div class="empty">Loading projects…</div></aside>
    <div id="scrim" aria-hidden="true"></div>
    <div id="gallery" data-view="1"></div>
  </div>

  <script src="/static/vendor/xterm.min.js"></script>
  <script src="/static/vendor/addon-fit.min.js"></script>
  <script src="/static/vendor/addon-web-links.min.js"></script>
  <script>
    (function () {
      "use strict";

      const statusEl = document.getElementById("status");
      const statusText = document.getElementById("status-text");
      const activeNameEl = document.getElementById("active-name");
      const sidebar = document.getElementById("sidebar");
      const gallery = document.getElementById("gallery");
      const viewSwitch = document.getElementById("view-switch");

      const PLUS_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>';
      const CHEVRON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';
      const CLOSE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';
      const ALERT_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>';
      const TERM_GLYPH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7l5 5-5 5M13 17h6"/></svg>';

      const THEME = {
        background: "#1e1e2e", foreground: "#cdd6f4", cursor: "#f5e0dc", selectionBackground: "#585b7066",
        black: "#45475a", red: "#f38ba8", green: "#a6e3a1", yellow: "#f9e2af", blue: "#89b4fa",
        magenta: "#f5c2e7", cyan: "#94e2d5", white: "#bac2de", brightBlack: "#585b70", brightRed: "#f38ba8",
        brightGreen: "#a6e3a1", brightYellow: "#f9e2af", brightBlue: "#89b4fa", brightMagenta: "#f5c2e7",
        brightCyan: "#94e2d5", brightWhite: "#a6adc8"
      };
      const MAX_RECONNECT_ATTEMPTS = 6;

      function wsUrl(terminalId) {
        const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
        return proto + "//" + window.location.host + "/ws?terminal_id=" + encodeURIComponent(terminalId);
      }
      function fontForView(n) { return n >= 8 ? 11.5 : n >= 4 ? 12.5 : 14; }

      // ── Pane: one xterm + one independent WebSocket ─────────────────────
      function createPane(index) {
        const el = document.createElement("div");
        el.className = "pane entering";
        el.style.animationDelay = (index * 45) + "ms";
        el.innerHTML =
          '<div class="pane-head"><span class="pdot"></span><span class="ptitle"><span class="pt-name">Empty</span></span>' +
          '<button class="pane-close" type="button" title="Close" aria-label="Close terminal">' + CLOSE_SVG + "</button></div>" +
          '<div class="pane-body"></div>' +
          '<div class="pane-empty">' +
            '<div class="pe-num">' + (index + 1) + "</div>" +
            '<div class="pe-icon" aria-hidden="true">' + TERM_GLYPH + "</div>" +
            '<div class="pe-title">No terminal</div>' +
            '<div class="pe-text">Pick one from the left</div>' +
            '<div class="pe-hint"><kbd>+</kbd> on a project to add</div>' +
          "</div>" +
          '<div class="pane-overlay"></div>';

        const body = el.querySelector(".pane-body");
        const titleEl = el.querySelector(".ptitle");
        const emptyEl = el.querySelector(".pane-empty");
        const overlayEl = el.querySelector(".pane-overlay");
        const closeBtn = el.querySelector(".pane-close");

        const term = new Terminal({
          cursorBlink: true, fontSize: fontForView(viewMode),
          fontFamily: '"Cascadia Code", "JetBrains Mono", ui-monospace, monospace',
          theme: THEME, allowProposedApi: true
        });
        const fit = new FitAddon.FitAddon();
        term.loadAddon(fit);
        term.loadAddon(new WebLinksAddon.WebLinksAddon());

        let opened = false;
        let ptyId = null;
        let socket = null, dataDisp = null;
        let reconnectTimer = null, reconnectAttempts = 0, manualClose = false;
        let unblurTimer = null;

        const ro = new ResizeObserver(() => { scheduleFit(); });
        let fitTimer = null;
        function scheduleFit() {
          if (fitTimer) return;
          fitTimer = requestAnimationFrame(() => {
            fitTimer = null;
            if (!opened) return;
            try { fit.fit(); } catch (_) {}
            const dims = fit.proposeDimensions();
            if (dims && socket && socket.readyState === WebSocket.OPEN) {
              socket.send(JSON.stringify({ type: "resize", cols: dims.cols, rows: dims.rows }));
            }
          });
        }

        function ensureOpen() {
          if (opened) return;
          term.open(body);
          opened = true;
          ro.observe(body);
        }

        function setPaneStatus(s) {
          el.classList.remove("s-connected", "s-connecting", "s-failed");
          if (s) el.classList.add("s-" + s);
          if (isFocused()) reflectGlobalStatus();
        }

        function paneStatusLabel() {
          if (el.classList.contains("s-connected")) return ["connected", "Connected"];
          if (el.classList.contains("s-connecting")) return ["connecting", "Connecting…"];
          if (el.classList.contains("s-failed")) return ["disconnected", "Disconnected"];
          return ["disconnected", ptyId ? "Idle" : "Idle"];
        }

        function showOverlayConnecting(label) {
          // Build via textContent (never innerHTML) so caller-supplied text can't
          // inject markup — overlay text may derive from untrusted WS payloads.
          overlayEl.replaceChildren();
          const spin = document.createElement("div");
          spin.className = "ov-spin";
          const text = document.createElement("div");
          text.className = "ov-text";
          text.textContent = label;
          overlayEl.append(spin, text);
          overlayEl.classList.add("show");
        }
        function showOverlayFailed(label, sub) {
          // Same rationale as showOverlayConnecting: text nodes only. ALERT_SVG is
          // a trusted constant, so it's the one piece set via innerHTML.
          overlayEl.replaceChildren();
          const icon = document.createElement("div");
          icon.className = "ov-icon";
          icon.innerHTML = ALERT_SVG;
          const text = document.createElement("div");
          text.className = "ov-text";
          text.textContent = label;
          overlayEl.append(icon, text);
          if (sub) {
            const subEl = document.createElement("div");
            subEl.className = "ov-sub";
            subEl.textContent = sub;
            overlayEl.append(subEl);
          }
          const retry = document.createElement("button");
          retry.type = "button";
          retry.className = "ov-retry";
          retry.textContent = "Reconnect";
          overlayEl.append(retry);
          overlayEl.classList.add("show");
          retry.addEventListener("click", () => { if (ptyId) reconnectAttempts = 0, openSocket(); });
        }
        function hideOverlay() { overlayEl.classList.remove("show"); }

        function clearReconnect() { if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; } }
        function teardownSocket() {
          manualClose = true; clearReconnect();
          if (dataDisp) { dataDisp.dispose(); dataDisp = null; }
          if (socket) { try { socket.onclose = null; socket.close(1000, "switch"); } catch (_) {} socket = null; }
        }

        function unblur() {
          if (unblurTimer) { clearTimeout(unblurTimer); unblurTimer = null; }
          body.classList.remove("swapping");
        }

        function openSocket() {
          if (!ptyId) return;
          manualClose = false;
          setPaneStatus("connecting");
          showOverlayConnecting(reconnectAttempts > 0 ? "Reconnecting…" : "Connecting…");
          const ws = new WebSocket(wsUrl(ptyId));
          ws.binaryType = "arraybuffer";
          socket = ws;

          ws.addEventListener("open", () => {
            reconnectAttempts = 0;
            setPaneStatus("connected");
            hideOverlay();
            scheduleFit();
            // Safety: unblur even if backlog never arrives (e.g. quiet terminal).
            unblurTimer = setTimeout(unblur, 260);
            if (isFocused()) term.focus();
          });
          ws.addEventListener("message", (event) => {
            if (event.data instanceof ArrayBuffer) { term.write(new Uint8Array(event.data)); unblur(); return; }
            try {
              const msg = JSON.parse(event.data);
              if (msg.type === "exit") {
                setPaneStatus("failed"); manualClose = true; unblur();
                // Coerce code to a number for display; the overlay also renders
                // via textContent, so untrusted values can't inject markup.
                const code = Number(msg.code);
                showOverlayFailed("Terminal exited", "Process ended with code " + (Number.isFinite(code) ? code : "unknown"));
              } else if (msg.type === "error") {
                term.writeln("\r\n\x1b[31m[error: " + msg.message + "]\x1b[0m");
              }
            } catch (_) {}
          });
          ws.addEventListener("close", () => {
            // Only suppress reconnect for intentional local teardown. A code-1000
            // close from a proxy/tunnel idle-timeout should still reconnect, so we
            // no longer special-case 1000 (our own teardown nulls onclose anyway).
            if (manualClose) return;
            if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
              setPaneStatus("failed");
              showOverlayFailed("Connection lost", "Couldn't reconnect after " + MAX_RECONNECT_ATTEMPTS + " attempts");
              loadProjects();
              return;
            }
            reconnectAttempts++;
            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 10000);
            setPaneStatus("connecting");
            showOverlayConnecting("Reconnecting in " + Math.round(delay / 1000) + "s…");
            clearReconnect();
            reconnectTimer = setTimeout(() => { if (!manualClose) openSocket(); }, delay);
          });
          ws.addEventListener("error", () => { setPaneStatus("connecting"); });

          if (dataDisp) dataDisp.dispose();
          dataDisp = term.onData((d) => { if (socket && socket.readyState === WebSocket.OPEN) socket.send(new TextEncoder().encode(d)); });
        }

        function attach(id) {
          if (id === ptyId && socket) { focus(); return; }
          ensureOpen();
          emptyEl.classList.add("hide");
          renderTitle(id);
          // Blur-out, then swap content under the blur (masks the reset flash).
          body.classList.add("swapping");
          setTimeout(() => {
            teardownSocket();
            ptyId = id;
            reconnectAttempts = 0;
            term.reset();
            openSocket();
          }, 120);
          syncSidebar();
        }

        function detach() {
          teardownSocket();
          ptyId = null;
          if (opened) term.reset();
          hideOverlay();
          setPaneStatus(null);
          titleEl.innerHTML = '<span class="pt-name">Empty</span>';
          emptyEl.classList.remove("hide");
          syncSidebar();
        }

        // Render the two-part "terminal · project" title for a pty id.
        function renderTitle(id) {
          const info = terminalInfoFor(id);
          let html = '<span class="pt-name"></span>';
          if (info.project) html += '<span class="pt-sep">·</span><span class="pt-proj"></span>';
          titleEl.innerHTML = html;
          titleEl.querySelector(".pt-name").textContent = info.name;
          if (info.project) titleEl.querySelector(".pt-proj").textContent = info.project;
        }
        // Refresh title if the bound terminal still exists (e.g. after rename).
        function refreshTitle() { if (ptyId) renderTitle(ptyId); }

        function dispose() {
          teardownSocket();
          try { ro.disconnect(); } catch (_) {}
          if (opened) { try { term.dispose(); } catch (_) {} }
          el.remove();
        }

        function focus() { setActiveByIndex(api.index); }
        function isFocused() { return panes[activeIndex] === api; }
        function setFocused(on) {
          el.classList.toggle("focused", on);
          if (on && opened && socket && socket.readyState === WebSocket.OPEN) term.focus();
        }
        function setFontSize(px) { if (term.options.fontSize !== px) { term.options.fontSize = px; scheduleFit(); } }

        // Clicking the pane focuses it; clicking close detaches.
        el.addEventListener("mousedown", () => focus());
        closeBtn.addEventListener("click", (e) => { e.stopPropagation(); detach(); });

        const api = {
          index, el, term, attach, detach, dispose, focus, setFocused, setFontSize, scheduleFit,
          paneStatusLabel, refreshTitle,
          get ptyId() { return ptyId; }
        };
        return api;
      }

      // ── Gallery controller ──────────────────────────────────────────────
      const VIEW_KEY = "termul-view-mode";
      const VIEWS = [1, 2, 4, 8, 16];
      let viewMode = 1;
      try { const v = parseInt(localStorage.getItem(VIEW_KEY), 10); if (VIEWS.includes(v)) viewMode = v; } catch (_) {}
      let panes = [];
      let activeIndex = 0;

      const segIndicator = viewSwitch.querySelector(".seg-indicator");
      const segButtons = [...viewSwitch.querySelectorAll("button")];

      function updateSegSwitch() {
        const idx = VIEWS.indexOf(viewMode);
        const btn = segButtons[idx];
        if (btn) {
          // Measure real offset/size so the indicator stays aligned across breakpoints.
          segIndicator.style.width = btn.offsetWidth + "px";
          segIndicator.style.transform = "translateX(" + (btn.offsetLeft - segButtons[0].offsetLeft) + "px)";
        }
        segButtons.forEach((b) => b.classList.toggle("active", parseInt(b.dataset.view, 10) === viewMode));
      }

      function reflectGlobalStatus() {
        const p = panes[activeIndex];
        if (!p) { setStatus("disconnected", "Idle"); setActiveName(null); return; }
        const [state, label] = p.paneStatusLabel();
        setStatus(state, label);
        setActiveName(p.ptyId ? terminalInfoFor(p.ptyId) : null);
      }
      function setStatus(state, text) { statusEl.className = state; statusText.textContent = text; }
      function setActiveName(info) {
        if (!info) { activeNameEl.classList.remove("show"); document.title = "Termul Remote"; return; }
        // Show terminal · project in the topbar; only single-view sets the tab title.
        let html = '<span class="an-name"></span>';
        if (info.project) html += '<span class="an-sep">·</span><span class="an-proj"></span>';
        activeNameEl.innerHTML = html;
        activeNameEl.querySelector(".an-name").textContent = info.name;
        if (info.project) activeNameEl.querySelector(".an-proj").textContent = info.project;
        activeNameEl.classList.add("show");
        document.title = (viewMode === 1 ? info.name + (info.project ? " — " + info.project : "") + " · " : "") + "Termul Remote";
      }

      function setActiveByIndex(i) {
        if (i < 0 || i >= panes.length) return;
        activeIndex = i;
        panes.forEach((p, idx) => p.setFocused(idx === i));
        reflectGlobalStatus();
        syncSidebar();
      }

      function addPane() {
        const p = createPane(panes.length);
        panes.push(p);
        gallery.appendChild(p.el);
      }

      function setView(n) {
        if (!VIEWS.includes(n)) return;
        viewMode = n;
        gallery.dataset.view = String(n);
        while (panes.length < n) addPane();
        while (panes.length > n) panes.pop().dispose();
        if (activeIndex >= n) activeIndex = 0;
        const fontPx = fontForView(n);
        panes.forEach((p) => p.setFontSize(fontPx));
        panes.forEach((p, idx) => p.setFocused(idx === activeIndex));
        updateSegSwitch();
        reflectGlobalStatus();
        syncSidebar();
        // Refit after the grid settles (cells change size).
        requestAnimationFrame(() => panes.forEach((p) => p.scheduleFit()));
        try { localStorage.setItem(VIEW_KEY, String(n)); } catch (_) {}
      }

      segButtons.forEach((b) => b.addEventListener("click", () => setView(parseInt(b.dataset.view, 10))));

      // Sidebar click → load into the focused pane; if already shown, just focus it.
      function onSelectTerminal(ptyId) {
        const existing = panes.findIndex((p) => p.ptyId === ptyId);
        if (existing !== -1) { setActiveByIndex(existing); if (window.__closeDrawerIfMobile) window.__closeDrawerIfMobile(); return; }
        const target = panes[activeIndex] || panes[0];
        if (!target) return;
        target.attach(ptyId);
        // Auto-advance focus to the next empty pane for fast gallery-filling.
        if (viewMode > 1) {
          for (let k = 1; k <= panes.length; k++) {
            const idx = (activeIndex + k) % panes.length;
            if (!panes[idx].ptyId) { setActiveByIndex(idx); break; }
          }
        }
        // On mobile, picking a terminal closes the drawer so the terminal is visible.
        if (window.__closeDrawerIfMobile) window.__closeDrawerIfMobile();
      }

      window.addEventListener("resize", () => {
        updateSegSwitch();
        panes.forEach((p) => p.scheduleFit());
      });

      // ── Project tree (diffed; rebuild only on real change) ──────────────
      let currentTree = { projects: [] };
      let lastSignature = null;

      const COLLAPSE_KEY = "termul-collapsed-projects";
      let collapsed = new Set();
      try { collapsed = new Set(JSON.parse(localStorage.getItem(COLLAPSE_KEY) || "[]")); } catch (_) {}
      function persistCollapsed() { try { localStorage.setItem(COLLAPSE_KEY, JSON.stringify([...collapsed])); } catch (_) {} }

      function treeSignature(tree) {
        return (tree.projects || []).map((p) =>
          p.id + ":" + p.name + ":" + (p.terminals || []).map((t) => t.ptyId + "~" + t.name).join(",")
        ).join("|");
      }
      function terminalNameFor(ptyId) {
        for (const p of currentTree.projects || []) for (const t of p.terminals || []) if (t.ptyId === ptyId) return t.name || ptyId;
        return null;
      }
      // Returns { name, project } for a pty id (project may be "").
      function terminalInfoFor(ptyId) {
        for (const p of currentTree.projects || []) {
          for (const t of p.terminals || []) {
            if (t.ptyId === ptyId) return { name: t.name || ptyId, project: p.name || "" };
          }
        }
        return { name: ptyId, project: "" };
      }

      // Reflect which terminals are shown (in any pane) and which is focused.
      function syncSidebar() {
        const shown = new Set(panes.map((p) => p.ptyId).filter(Boolean));
        const focusedId = panes[activeIndex] ? panes[activeIndex].ptyId : null;
        for (const row of sidebar.querySelectorAll(".term")) {
          row.classList.toggle("shown", shown.has(row.dataset.pty));
          row.classList.toggle("active", row.dataset.pty === focusedId);
        }
      }

      function renderTree(tree, animate) {
        sidebar.innerHTML = "";
        const projects = tree.projects || [];
        if (projects.length === 0) {
          sidebar.innerHTML = '<div class="empty">No projects yet.<div class="hint">Open Termul on the desktop and turn on Remote Access.</div></div>';
          return;
        }
        const label = document.createElement("div");
        label.className = "sidebar-label";
        label.textContent = "Projects";
        sidebar.appendChild(label);

        let i = 0;
        for (const p of projects) {
          const proj = document.createElement("div");
          proj.className = "project" + (collapsed.has(p.id) ? " collapsed" : "");
          const head = document.createElement("div");
          head.className = "project-head" + (animate ? " enter" : "");
          if (animate) head.style.animationDelay = (i * 40) + "ms";
          head.innerHTML =
            '<span class="chevron" aria-hidden="true">' + CHEVRON_SVG + "</span>" +
            '<span class="pname"></span><span class="count"></span>' +
            '<button class="add" type="button" title="Add terminal">' + PLUS_SVG + "</button>";
          head.querySelector(".pname").textContent = p.name;
          head.querySelector(".count").textContent = String((p.terminals || []).length);
          head.addEventListener("click", () => toggleCollapse(p.id, proj));
          const addBtn = head.querySelector(".add");
          addBtn.addEventListener("click", (e) => { e.stopPropagation(); requestSpawn(p.id, addBtn); });
          proj.appendChild(head);
          i++;

          const list = document.createElement("div");
          list.className = "term-list";
          const inner = document.createElement("div");
          inner.className = "term-list-inner";
          for (const t of p.terminals || []) {
            const row = document.createElement("div");
            row.className = "term" + (animate ? " enter" : "");
            if (animate) row.style.animationDelay = (i * 40) + "ms";
            row.dataset.pty = t.ptyId;
            row.title = t.cwd || t.name;
            row.innerHTML = '<span class="tdot"></span><span class="tlabel"></span>';
            row.querySelector(".tlabel").textContent = t.name || t.ptyId;
            row.addEventListener("click", () => onSelectTerminal(t.ptyId));
            inner.appendChild(row);
            i++;
          }
          list.appendChild(inner);
          proj.appendChild(list);
          sidebar.appendChild(proj);
        }
        syncSidebar();
      }

      function toggleCollapse(projectId, projEl) {
        if (collapsed.has(projectId)) collapsed.delete(projectId); else collapsed.add(projectId);
        projEl.classList.toggle("collapsed");
        persistCollapsed();
      }

      async function loadProjects() {
        try {
          const res = await fetch("/api/projects", { cache: "no-store" });
          if (!res.ok) return;
          const tree = await res.json();
          const sig = treeSignature(tree);
          currentTree = tree;
          if (sig === lastSignature) { syncSidebar(); return; }
          lastSignature = sig;
          renderTree(tree, true);
          panes.forEach((p) => p.refreshTitle());
          reflectGlobalStatus();
        } catch (_) {}
      }

      async function requestSpawn(projectId, btn) {
        if (btn.disabled) return;
        btn.disabled = true;
        const original = btn.innerHTML;
        btn.innerHTML = '<span class="spin"></span>';
        const restore = () => { btn.disabled = false; btn.innerHTML = original; };
        try {
          await fetch("/api/spawn", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ projectId }) });
          let tries = 0;
          const before = countTerminals(projectId);
          const poll = setInterval(async () => {
            await loadProjects();
            tries++;
            if (countTerminals(projectId) > before || tries >= 10) { clearInterval(poll); restore(); }
          }, 500);
        } catch (_) { restore(); }
      }
      function countTerminals(projectId) {
        const p = (currentTree.projects || []).find((x) => x.id === projectId);
        return p ? (p.terminals || []).length : 0;
      }

      // ── GitHub star count (cached, formatted) ───────────────────────────
      function formatStars(n) {
        if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, "") + "k";
        return String(n);
      }
      async function loadStars() {
        const el = document.getElementById("gh-count");
        if (!el) return;
        const CACHE_KEY = "termul-gh-stars";
        const TTL = 6 * 60 * 60 * 1000;
        let stale = true;
        try {
          const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || "null");
          if (cached && typeof cached.stars === "number") {
            el.textContent = formatStars(cached.stars); el.classList.remove("loading");
            stale = Date.now() - cached.at > TTL;
          }
        } catch (_) {}
        if (!stale) return;
        try {
          const res = await fetch("https://api.github.com/repos/gnoviawan/termul", { headers: { Accept: "application/vnd.github+json" } });
          if (!res.ok) return;
          const data = await res.json();
          if (typeof data.stargazers_count === "number") {
            el.textContent = formatStars(data.stargazers_count); el.classList.remove("loading");
            try { localStorage.setItem(CACHE_KEY, JSON.stringify({ stars: data.stargazers_count, at: Date.now() })); } catch (_) {}
          }
        } catch (_) {}
      }

      // ── Sidebar: desktop collapse + mobile drawer ───────────────────────
      const mainEl = document.getElementById("main");
      const sidebarToggle = document.getElementById("sidebar-toggle");
      const scrim = document.getElementById("scrim");
      const SIDEBAR_KEY = "termul-sidebar-collapsed";
      const mqMobile = window.matchMedia("(max-width: 720px)");
      const isMobile = () => mqMobile.matches;

      // Desktop: persistent collapse to zero width.
      let sidebarCollapsed = false;
      try { sidebarCollapsed = localStorage.getItem(SIDEBAR_KEY) === "1"; } catch (_) {}
      function applyDesktopCollapse(state, animate) {
        if (!animate) mainEl.style.transition = "none";
        mainEl.classList.toggle("sidebar-collapsed", state);
        sidebarToggle.setAttribute("aria-pressed", String(state));
        if (!animate) requestAnimationFrame(() => { mainEl.style.transition = ""; });
        setTimeout(() => panes.forEach((p) => p.scheduleFit()), animate ? 280 : 0);
      }

      // Mobile: ephemeral off-canvas drawer over a scrim.
      let drawerOpen = false;
      function setDrawer(open) {
        drawerOpen = open;
        mainEl.classList.toggle("drawer-open", open);
        sidebarToggle.setAttribute("aria-pressed", String(open));
        document.body.style.overflow = open ? "hidden" : "";
      }

      function toggleSidebar() {
        if (isMobile()) {
          setDrawer(!drawerOpen);
        } else {
          sidebarCollapsed = !sidebarCollapsed;
          applyDesktopCollapse(sidebarCollapsed, true);
          try { localStorage.setItem(SIDEBAR_KEY, sidebarCollapsed ? "1" : "0"); } catch (_) {}
        }
      }

      sidebarToggle.addEventListener("click", toggleSidebar);
      scrim.addEventListener("click", () => setDrawer(false));
      document.addEventListener("keydown", (e) => { if (e.key === "Escape" && drawerOpen) setDrawer(false); });

      // Apply the correct model for the current breakpoint; re-sync on rotate/resize.
      function syncSidebarMode() {
        if (isMobile()) {
          // Drawer model: clear desktop collapse, start closed.
          mainEl.classList.remove("sidebar-collapsed");
          setDrawer(false);
        } else {
          // Desktop model: clear drawer, restore persisted collapse.
          setDrawer(false);
          applyDesktopCollapse(sidebarCollapsed, false);
        }
        requestAnimationFrame(() => panes.forEach((p) => p.scheduleFit()));
      }
      (mqMobile.addEventListener ? mqMobile.addEventListener("change", syncSidebarMode)
                                 : mqMobile.addListener(syncSidebarMode));
      syncSidebarMode();

      // Expose so terminal selection can auto-close the drawer on mobile.
      window.__closeDrawerIfMobile = () => { if (isMobile() && drawerOpen) setDrawer(false); };

      // ── Boot ─────────────────────────────────────────────────────────────
      setView(viewMode);
      loadStars();
      loadProjects();
      setInterval(loadProjects, 2000);
    })();
  </script>
</body>
</html>

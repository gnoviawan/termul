name: Update Star History

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-star-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate Star History SVG
        uses: star-history/star-history@v0.0.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repo: gnoviawan/termul
          output: img/star-history.svg

      - name: Commit Star History SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add img/star-history.svg
          git diff --staged --quiet || git commit -m "docs: update star history chart"
          git push
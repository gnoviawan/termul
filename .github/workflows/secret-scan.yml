name: Secret Scan

on:
  pull_request:
    branches: [main, develop, dev]
  push:
    branches: [main, develop, dev]
  schedule:
    - cron: "41 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Scan for leaked secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        uses: docker://zricethezav/gitleaks:v8.24.3
        with:
          args: detect --source . --redact --verbose

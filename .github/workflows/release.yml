name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
      normalized_version: ${{ steps.version.outputs.normalized_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Normalize tag version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          if [[ -z "$VERSION" ]]; then
            echo "Tag must include a version" >&2
            exit 1
          fi
          echo "normalized_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check prerelease
        id: check
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ (-[0-9A-Za-z]+|alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  create_release:
    name: Create Draft Release
    needs: changelog
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.releaseId }}
    steps:
      - name: Create or update draft release
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ needs.changelog.outputs.changelog }}
          IS_PRERELEASE: ${{ needs.changelog.outputs.is_prerelease }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = context.ref.replace('refs/tags/', '')
            const releaseName = `Termul Manager ${tagName}`
            const releaseBody = process.env.RELEASE_BODY || ''
            const prerelease = process.env.IS_PRERELEASE === 'true'

            let release
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              })

              release = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
                tag_name: tagName,
                name: releaseName,
                body: releaseBody,
                draft: existing.data.draft,
                prerelease,
              })
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }

              release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                name: releaseName,
                body: releaseBody,
                draft: true,
                prerelease,
              })
            }

            core.setOutput('releaseId', String(release.data.id))

  build:
    name: Build (${{ matrix.platform }})
    needs: [changelog, create_release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

          - platform: linux-x64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install npm dependencies
        run: npm ci

      - name: Align app versions with tag
        shell: bash
        env:
          TAG_VERSION: ${{ needs.changelog.outputs.normalized_version }}
        run: |
          node <<'NODE'
          const fs = require('fs')

          const tagVersion = process.env.TAG_VERSION
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'))
          if (pkg.version !== tagVersion) {
            throw new Error(
              `package.json version ${pkg.version} does not match tag ${tagVersion}`
            )
          }

          const cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8')
          const cargoMatch = cargo.match(/^version\s*=\s*"([^"]+)"/m)
          if (!cargoMatch || cargoMatch[1] !== tagVersion) {
            const cargoVersion = cargoMatch?.[1] ?? 'missing'
            throw new Error(
              `src-tauri/Cargo.toml version ${cargoVersion} ` +
                `does not match tag ${tagVersion}`
            )
          }

          const tauri = JSON.parse(
            fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')
          )
          if (tauri.version !== tagVersion) {
            throw new Error(
              `src-tauri/tauri.conf.json version ${tauri.version} ` +
                `does not match tag ${tagVersion}`
            )
          }
          NODE

      - name: Build and publish release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Termul Manager ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.changelog }}
          releaseId: ${{ needs.create_release.outputs.release_id }}
          releaseDraft: true
          prerelease: ${{ needs.changelog.outputs.is_prerelease }}
          tauriScript: npm run tauri
          args: ${{ matrix.args }} --config src-tauri/tauri.conf.prod.json

  publish_release:
    name: Publish Release
    needs: [changelog, create_release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify updater assets before publish
        uses: actions/github-script@v7
        env:
          IS_PRERELEASE: ${{ needs.changelog.outputs.is_prerelease }}
          RELEASE_ID: ${{ needs.create_release.outputs.release_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = Number(process.env.RELEASE_ID)
            const isPrerelease = process.env.IS_PRERELEASE === 'true'
            const stableManifestPath =
              '/releases/latest/download/latest.json'
            const channelPolicy = isPrerelease
              ? 'stable clients intentionally ignore prerelease tags'
              : 'stable clients consume the stable latest.json manifest'

            core.info(`Updater channel policy: ${channelPolicy}`)

            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              per_page: 100,
            })

            const assetNames = assets.map((asset) => asset.name)
            core.info(`Draft release assets: ${assetNames.join(', ')}`)

            if (isPrerelease) {
              core.notice(
                [
                  'This tag is marked as a prerelease.',
                  'Stable clients intentionally ignore prerelease tags',
                  `because they only check ${stableManifestPath}.`,
                ].join(' ')
              )
              return
            }

            const hasLatestJson = assetNames.includes('latest.json')
            if (!hasLatestJson) {
              const publishedAssets = assetNames.join(', ')
              core.setFailed(
                `Stable release is missing latest.json. ` +
                  `Draft assets: ${publishedAssets}`
              )
            }

      - name: Publish draft release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ needs.changelog.outputs.changelog }}
          IS_PRERELEASE: ${{ needs.changelog.outputs.is_prerelease }}
          RELEASE_ID: ${{ needs.create_release.outputs.release_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = Number(process.env.RELEASE_ID)
            const tagName = context.ref.replace('refs/tags/', '')
            const releaseName = `Termul Manager ${tagName}`
            const releaseBody = process.env.RELEASE_BODY || ''
            const prerelease = process.env.IS_PRERELEASE === 'true'

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              tag_name: tagName,
              name: releaseName,
              body: releaseBody,
              draft: false,
              prerelease,
            })

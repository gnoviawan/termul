name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Check prerelease
        id: check
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" =~ (-[0-9A-Za-z]+|alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  create_release:
    name: Create Draft Release
    needs: changelog
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.releaseId }}
    steps:
      - name: Create or update draft release
        id: release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ needs.changelog.outputs.changelog }}
          IS_PRERELEASE: ${{ needs.changelog.outputs.is_prerelease }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = context.ref.replace('refs/tags/', '')
            const releaseName = `Termul Manager ${tagName}`
            const releaseBody = process.env.RELEASE_BODY || ''
            const prerelease = process.env.IS_PRERELEASE === 'true'

            let release
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              })

              release = await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
                tag_name: tagName,
                name: releaseName,
                body: releaseBody,
                draft: true,
                prerelease,
              })
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }

              release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                name: releaseName,
                body: releaseBody,
                draft: true,
                prerelease,
              })
            }

            core.setOutput('releaseId', String(release.data.id))

  build:
    name: Build (${{ matrix.platform }})
    needs: [changelog, create_release]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
          - platform: macos-arm64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-x64
            runner: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: linux-x64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install npm dependencies
        run: npm ci

      - name: Build and publish release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PUBLIC_KEY: ${{ secrets.TAURI_SIGNING_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Termul Manager ${{ github.ref_name }}'
          releaseBody: ${{ needs.changelog.outputs.changelog }}
          releaseId: ${{ needs.create_release.outputs.release_id }}
          releaseDraft: true
          prerelease: ${{ needs.changelog.outputs.is_prerelease }}
          tauriScript: npm run tauri
          args: ${{ matrix.args }} --config src-tauri/tauri.conf.prod.json

  publish_release:
    name: Publish Release
    needs: [changelog, create_release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ needs.changelog.outputs.changelog }}
          IS_PRERELEASE: ${{ needs.changelog.outputs.is_prerelease }}
          RELEASE_ID: ${{ needs.create_release.outputs.release_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releaseId = Number(process.env.RELEASE_ID)
            const tagName = context.ref.replace('refs/tags/', '')
            const releaseName = `Termul Manager ${tagName}`
            const releaseBody = process.env.RELEASE_BODY || ''
            const prerelease = process.env.IS_PRERELEASE === 'true'

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              tag_name: tagName,
              name: releaseName,
              body: releaseBody,
              draft: false,
              prerelease,
            })
